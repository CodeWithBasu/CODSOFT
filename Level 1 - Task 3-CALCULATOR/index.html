<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator | Level 1 - Task 3</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container glassmorphism">
        <!-- Display Screen -->
        <div class="calculator-display">
            <div class="previous-operand" data-previous-operand></div>
            <div class="current-operand" data-current-operand>0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="calculator-grid">
            <button class="btn btn-action" data-all-clear>AC</button>
            <button class="btn btn-action" data-delete>DEL</button>
            <button class="btn btn-action" data-operation>%</button>
            <button class="btn btn-operator" data-operation>÷</button>

            <button class="btn btn-number" data-number>7</button>
            <button class="btn btn-number" data-number>8</button>
            <button class="btn btn-number" data-number>9</button>
            <button class="btn btn-operator" data-operation>×</button>

            <button class="btn btn-number" data-number>4</button>
            <button class="btn btn-number" data-number>5</button>
            <button class="btn btn-number" data-number>6</button>
            <button class="btn btn-operator" data-operation>−</button>

            <button class="btn btn-number" data-number>1</button>
            <button class="btn btn-number" data-number>2</button>
            <button class="btn btn-number" data-number>3</button>
            <button class="btn btn-operator" data-operation>+</button>

            <button class="btn btn-number span-two" data-number>0</button>
            <button class="btn btn-number" data-number>.</button>
            <button class="btn btn-equal" data-equals>=</button>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
